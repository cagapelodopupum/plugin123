name: Build Plugin

on:
  push:
    branches: [ principal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -f InvocarTuttzs/pom.xml

      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: SummonTuttzs
          path: InvocarTuttzs/target/SummonTuttzs-1.0.0.jar
